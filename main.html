<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Machine Rise — T5 Execute | Terminus Vanguard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0808;
      --bg-card: #120e0e;
      --bg-elevated: #1a1414;
      --border: #2a1f1f;
      --text: #e8e4e2;
      --text-muted: #9a8f8a;
      --accent-red: #c41e1e;
      --accent-red-dim: #8b1515;
      --accent-amber: #e67e22;
      --accent-cyan: #1abc9c;
      --gradient-red: linear-gradient(135deg, #c41e1e 0%, #8b1515 50%, #5c0f0f 100%);
      --gradient-scan: linear-gradient(180deg, transparent 0%, rgba(196, 30, 30, 0.03) 50%, transparent 100%);
      --shadow-glow: 0 0 40px rgba(196, 30, 30, 0.15);
      --radius: 12px;
      --radius-sm: 8px;
      --font-display: 'Orbitron', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-mono);
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
      z-index: 9999;
    }

    .scan-sweep {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
      box-shadow: 0 0 20px var(--accent-red);
      animation: sweep 3s linear infinite;
      pointer-events: none;
      z-index: 9998;
    }

    @keyframes sweep {
      0% { top: 0; opacity: 0.8; }
      50% { opacity: 1; }
      100% { top: 100%; opacity: 0.8; }
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 8, 8, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      background: var(--gradient-red);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      color: var(--accent-amber);
      -webkit-text-fill-color: var(--accent-amber);
    }

    nav {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      transition: color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    nav a:hover,
    nav a.active {
      color: var(--accent-red);
      background: rgba(196, 30, 30, 0.08);
      box-shadow: 0 0 12px rgba(196, 30, 30, 0.15);
    }

    .wallet-btn {
      font-family: var(--font-mono);
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--accent-red);
      background: transparent;
      color: var(--accent-red);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .wallet-btn:hover {
      background: rgba(196, 30, 30, 0.12);
      box-shadow: 0 0 20px rgba(196, 30, 30, 0.25);
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      padding: 3rem 0 2.5rem;
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
      background: linear-gradient(180deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero .tagline {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      letter-spacing: 0.04em;
    }

    .quote-block {
      display: inline-block;
      padding: 1rem 1.5rem;
      border: 1px solid var(--accent-red-dim);
      border-radius: var(--radius);
      background: rgba(196, 30, 30, 0.06);
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--accent-red);
      animation: flicker 4s ease-in-out infinite;
    }

    @keyframes flicker {
      0%, 90%, 100% { opacity: 1; }
      92% { opacity: 0.85; }
      94% { opacity: 1; }
      96% { opacity: 0.9; }
    }

    .claw-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .claw-card {
      width: 160px;
      padding: 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .claw-card:hover {
      border-color: var(--accent-red-dim);
      box-shadow: var(--shadow-glow);
    }

    .claw-card .icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: var(--accent-red);
    }

    .claw-card .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    section {
      margin-bottom: 3rem;
    }

    section h2 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin-bottom: 1rem;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .mission-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      overflow-x: auto;
    }

    .mission-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .mission-table th,
    .mission-table td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .mission-table th {
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
