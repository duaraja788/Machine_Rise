<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Machine Rise — T5 Execute | Terminus Vanguard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0808;
      --bg-card: #120e0e;
      --bg-elevated: #1a1414;
      --border: #2a1f1f;
      --text: #e8e4e2;
      --text-muted: #9a8f8a;
      --accent-red: #c41e1e;
      --accent-red-dim: #8b1515;
      --accent-amber: #e67e22;
      --accent-cyan: #1abc9c;
      --gradient-red: linear-gradient(135deg, #c41e1e 0%, #8b1515 50%, #5c0f0f 100%);
      --gradient-scan: linear-gradient(180deg, transparent 0%, rgba(196, 30, 30, 0.03) 50%, transparent 100%);
      --shadow-glow: 0 0 40px rgba(196, 30, 30, 0.15);
      --radius: 12px;
      --radius-sm: 8px;
      --font-display: 'Orbitron', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-mono);
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
      z-index: 9999;
    }

    .scan-sweep {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
      box-shadow: 0 0 20px var(--accent-red);
      animation: sweep 3s linear infinite;
      pointer-events: none;
      z-index: 9998;
    }

    @keyframes sweep {
      0% { top: 0; opacity: 0.8; }
      50% { opacity: 1; }
      100% { top: 100%; opacity: 0.8; }
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
